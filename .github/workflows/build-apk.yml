
name: Build Custom v2rayNG APK

on:
  workflow_dispatch: # 支持你在 Actions 页面手动点击按钮触发打包

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout v2rayNG Code
      uses: actions/checkout@v4
      with:
        submodules: 'recursive' # 告诉 GitHub 把官方子模块也一起拉下来

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.22'

    - name: Install gomobile
      run: |
        go install golang.org/x/mobile/cmd/gomobile@latest
        echo "$HOME/go/bin" >> $GITHUB_PATH

    - name: Hijack and Sync Custom Submodule
      run: |
        # 1. 强行把子模块的远程地址指向你自己的 AndroidLibXrayLite 仓库
        cd AndroidLibXrayLite
        git remote set-url origin https://github.com/DFBB2010/AndroidLibXrayLite.git
        
        # 2. 强行拉取并切换到你改好了 go.mod 的 main 分支
        git fetch origin
        git checkout main
        git pull origin main
        cd ..

    - name: Build APK with Gradle
      run: |
        # 赋予 Gradle 执行权限并开始编译 Release 版本 APK
        chmod +x gradlew
        ./gradlew assembleRelease

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: v2rayNG-Custom-APK
        path: app/build/outputs/apk/release/*.apk
